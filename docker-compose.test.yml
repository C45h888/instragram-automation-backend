# ============================================
# Constitutional Runtime Simulation
# Test Infrastructure - Docker Compose
# ============================================
# Purpose: Ephemeral, isolated test environment
# for governance runtime validation and
# orchestration boundary testing.
#
# Stack:
#   - Redis (ephemeral): Intent queue, dedup cache
#   - PostgreSQL (ephemeral): Governance lineage,
#     telemetry projections, execution state
#   - Test isolation via network partitioning
#   - Deterministic startup topology
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   docker-compose -f docker-compose.test.yml down -v
# ============================================

services:
  # ----------------------------------------
  # Redis - Ephemeral Test Instance
  # ----------------------------------------
  test-redis:
    image: redis:7-alpine
    container_name: instagram-test-redis
    restart: "no"
    command: [
      "redis-server",
      "--appendonly", "no",
      "--save", "",  # Disable persistence for clean test runs
      "--loglevel", "debug",
      "--port", "6379"
    ]
    ports:
      - "6379:6379"
    networks:
      - test-runtime-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - test-redis-data:/data
    mem_limit: 512m
    cpu_shares: 512

  # ----------------------------------------
  # PostgreSQL - Ephemeral Test Instance
  # ----------------------------------------
  test-postgres:
    image: postgres:15-alpine
    container_name: instagram-test-postgres
    restart: "no"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testgovernance
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    networks:
      - test-runtime-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testgovernance"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - test-postgres-data:/var/lib/postgresql/data
      - ./tests/init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: 512m
    cpu_shares: 1024
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=16MB
      -c log_statement=all
      -c log_min_duration_statement=1000

  # ----------------------------------------
  # Test Orchestration Runner
  # ----------------------------------------
  test-runner:
    image: node:22-alpine
    container_name: instagram-test-runner
    restart: "no"
    working_dir: /app
    # entrypoint script handles: dependency wait, Redis flush, then exec args
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: ["sleep", "infinity"]
    networks:
      - test-runtime-net
    environment:
      NODE_ENV: test
      REDIS_URL: redis://test-redis:6379
      POSTGRES_HOST: test-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testgovernance
      SKIP_DB_TUNNEL: "true"
    depends_on:
      test-redis:
        condition: service_healthy
      test-postgres:
        condition: service_healthy
    volumes:
      # Project source (read-only) for runtime code
      - .:/app:ro
      # tests/ and output/ are writable — vitest writes JSON reports here
      - ./tests:/app/tests
      - ./tests/output:/app/tests/output
    mem_limit: 1g
    cpu_shares: 1024

networks:
  test-runtime-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  test-redis-data:
  test-postgres-data:
