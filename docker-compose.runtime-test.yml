# ============================================
# Deterministic Runtime Simulation Stack
# docker-compose.runtime-test.yml
# ============================================
# Purpose: Isolated constitutional simulation
# for deterministic runtime validation.
#
# This stack contains:
#   - Redis: Event queue, dedup cache
#   - PostgreSQL: Governance lineage, projections
#   - Governance Runtime: Constitutional kernel + FSMs
#   - Telemetry Projection Layer
#   - Membrane Orchestrators
#   - Lineage Persistence
#   - Mock Fetcher Substrates
#
# Usage:
#   docker-compose -f docker-compose.runtime-test.yml up -d
#   docker-compose -f docker-compose.runtime-test.yml down -v
# ============================================

services:
  # ----------------------------------------
  # Redis - Event Queue & Caching
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: runtime-redis
    restart: "no"
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--appendfsync", "everysec",
      "--loglevel", "notice",
      "--port", "6379"
    ]
    ports:
      - "6379:6379"
    networks:
      - runtime-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    mem_limit: 512m
    cpu_shares: 512

  # ----------------------------------------
  # PostgreSQL - Governance Lineage
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: runtime-postgres
    restart: "no"
    environment:
      POSTGRES_USER: runtimeuser
      POSTGRES_PASSWORD: runtimepass
      POSTGRES_DB: runtimegovernance
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    networks:
      - runtime-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtimeuser -d runtimegovernance"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./tests/init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: 1g
    cpu_shares: 1024
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c log_statement=all
      -c log_min_duration_statement=500

  # ----------------------------------------
  # Governance Runtime
  # ----------------------------------------
  runtime:
    image: node:18-alpine
    container_name: runtime-governance
    restart: "no"
    working_dir: /app
    command: ["node", "-e", "console.log('Governance runtime placeholder - integrate server.js')"]
    networks:
      - runtime-net
    environment:
      NODE_ENV: test
      REDIS_URL: redis://redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: runtimeuser
      POSTGRES_PASSWORD: runtimepass
      POSTGRES_DB: runtimegovernance
      SKIP_DB_TUNNEL: "true"
      WAIT_FOR_REDIS: "true"
      WAIT_FOR_POSTGRES: "true"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    mem_limit: 1g
    cpu_shares: 1024

  # ----------------------------------------
  # Mock Fetcher - Success Path
  # ----------------------------------------
  mock-fetcher-success:
    image: node:18-alpine
    container_name: runtime-mock-fetcher
    restart: "no"
    working_dir: /app
    command: ["sleep", "infinity"]
    networks:
      - runtime-net
    volumes:
      - ./tests/mock-substrates:/mock-substrates:ro
    mem_limit: 256m
    cpu_shares: 256

  # ----------------------------------------
  # Event Injector
  # ----------------------------------------
  event-injector:
    image: node:18-alpine
    container_name: runtime-event-injector
    restart: "no"
    working_dir: /app
    command: ["sleep", "infinity"]
    networks:
      - runtime-net
    volumes:
      - .:/app
    mem_limit: 512m
    cpu_shares: 512

networks:
  runtime-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16

volumes:
  redis-data:
  postgres-data:
